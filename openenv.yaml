version: "1.0"
name: "CloudOps Triage Simulator"
description: "An agentic environment where an AI must diagnose and resolve cloud infrastructure incidents using logs and metrics."
tasks:
  - id: "level-1"
    description: "Identify a deadlocked service and issue a RESTART command."
    difficulty: "easy"
    grader: "grader:grade_task"
  - id: "level-2"
    description: "Identify resource exhaustion and issue a SCALE_UP command."
    difficulty: "medium"
    grader: "grader:grade_task"
  - id: "level-3"
    description: "Identify a bad deployment and issue a ROLLBACK command."
    difficulty: "hard"
    grader: "grader:grade_task"
